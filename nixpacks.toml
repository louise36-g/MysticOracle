[start]
cmd = '''cat > /assets/Caddyfile << 'CADDYEOF'
:{$PORT} {
	# --- Compression: zstd preferred, then gzip ---
	encode {
		zstd
		gzip
		minimum_length 256
	}

	root * ../app/{$NIXPACKS_SPA_OUTPUT_DIR}

	# --- Security Headers ---
	header {
		Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
		X-Frame-Options "DENY"
		X-Content-Type-Options "nosniff"
		Referrer-Policy "strict-origin-when-cross-origin"
		Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()"
		Content-Security-Policy "default-src 'self'; script-src 'self' https://clerk.celestiarcana.com https://*.clerk.accounts.dev https://challenges.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://res.cloudinary.com https://img.clerk.com; connect-src 'self' https://clerk.celestiarcana.com https://*.clerk.accounts.dev https://*.clerk.dev wss://*.clerk.accounts.dev https://api.celestiarcana.com https://www.google-analytics.com https://region1.google-analytics.com https://*.ingest.de.sentry.io; frame-src https://challenges.cloudflare.com https://*.clerk.accounts.dev; worker-src 'self' blob:; manifest-src 'self'; report-uri https://api.celestiarcana.com/api/v1/health/csp-report;"
		-Server
	}

	# --- Service Worker: always revalidate ---
	@serviceWorker {
		path /sw.js /assets/workbox-*
	}
	header @serviceWorker {
		Cache-Control "no-cache, must-revalidate"
	}

	# --- Hashed assets: immutable forever ---
	@hashedAssets {
		path /assets/*.js /assets/*.css
	}
	header @hashedAssets {
		Cache-Control "public, max-age=31536000, immutable"
	}

	# --- Self-hosted fonts: 1 year cache ---
	@fonts {
		path /fonts/*
	}
	header @fonts {
		Cache-Control "public, max-age=31536000, immutable"
	}

	# --- Static images: 30 days + stale-while-revalidate ---
	@images {
		path /background-celestiarcana.*
		path /logos/*
		path /icons/*
		path /favicon.png
		path /apple-touch-icon.png
		path /og-image.jpg
		path /screenshots/*
	}
	header @images {
		Cache-Control "public, max-age=2592000, stale-while-revalidate=86400"
	}

	# --- Metadata files: 1 hour + stale-while-revalidate ---
	@metadata {
		path /manifest.json
		path /robots.txt
		path /sitemap.xml
	}
	header @metadata {
		Cache-Control "public, max-age=3600, stale-while-revalidate=86400"
	}

	# --- SPA fallback + HTML caching ---
	@notStaticFile {
		not path /assets/* /fonts/* /logos/* /icons/* /screenshots/*
		not path /background-celestiarcana.* /favicon.png /apple-touch-icon.png
		not path /og-image.jpg /manifest.json /robots.txt /sitemap.xml
		not path /sw.js
	}
	header @notStaticFile {
		Cache-Control "public, max-age=0, must-revalidate"
	}

	try_files {path} {path}/index.html /index.html
	file_server
}
CADDYEOF
caddy run --config /assets/Caddyfile --adapter caddyfile 2>&1'''
